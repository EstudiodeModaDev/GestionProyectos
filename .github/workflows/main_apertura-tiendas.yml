name: Build and deploy Node.js app to Azure Web App - apertura-tiendas

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build   

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: apertura-tiendas
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C3EE4BE615924B08B71D9D2D53804F94 }}
          package: ./dist  
